<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Optimization contour ellipses -->
  <ellipse cx="32" cy="32" rx="22" ry="17" fill="none" stroke="#059669" stroke-width="0.6" opacity="0.2"/>
  <ellipse cx="32" cy="32" rx="15" ry="11" fill="none" stroke="#059669" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="32" cy="32" rx="8" ry="6" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.4"/>

  <!-- Distribution network tree -->
  <!-- Source to trunk -->
  <line x1="32" y1="13" x2="32" y2="24" stroke="#3b82f6" stroke-width="1.2" opacity="0.8"/>
  <!-- Trunk splits -->
  <line x1="32" y1="24" x2="20" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
  <line x1="32" y1="24" x2="44" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
  <!-- Left branch -->
  <line x1="20" y1="32" x2="14" y2="42" stroke="#3b82f6" stroke-width="0.8" opacity="0.55"/>
  <line x1="20" y1="32" x2="24" y2="43" stroke="#3b82f6" stroke-width="0.8" opacity="0.55"/>
  <!-- Right branch -->
  <line x1="44" y1="32" x2="40" y2="43" stroke="#3b82f6" stroke-width="0.8" opacity="0.55"/>
  <line x1="44" y1="32" x2="50" y2="42" stroke="#3b82f6" stroke-width="0.8" opacity="0.55"/>

  <!-- Leaf nodes -->
  <circle cx="14" cy="42" r="1.8" fill="#3b82f6" opacity="0.7"/>
  <circle cx="24" cy="43" r="1.8" fill="#3b82f6" opacity="0.7"/>
  <circle cx="40" cy="43" r="1.8" fill="#3b82f6" opacity="0.7"/>
  <circle cx="50" cy="42" r="1.8" fill="#3b82f6" opacity="0.7"/>

  <!-- Junction nodes -->
  <circle cx="20" cy="32" r="2.5" fill="#2563eb"/>
  <circle cx="44" cy="32" r="2.5" fill="#2563eb"/>
  <circle cx="32" cy="24" r="3" fill="#2563eb"/>

  <!-- Source node with sine wave -->
  <circle cx="32" cy="13" r="4" fill="#e2e8f0" stroke="#2563eb" stroke-width="1"/>
  <path d="M 29,13 C 30,11 31,11 32,13 C 33,15 34,15 35,13" fill="none" stroke="#2563eb" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Optimal point crosshair -->
  <circle cx="32" cy="32" r="3" fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.8"/>
  <line x1="32" y1="28" x2="32" y2="36" stroke="#34d399" stroke-width="0.6" opacity="0.7"/>
  <line x1="28" y1="32" x2="36" y2="32" stroke="#34d399" stroke-width="0.6" opacity="0.7"/>
  <circle cx="32" cy="32" r="1.2" fill="#34d399"/>
</svg>
