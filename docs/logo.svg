<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="node-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="opt-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="opt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64" fill="url(#bg)"/>

  <!-- Optimization contour ellipses (cost surface) -->
  <ellipse cx="256" cy="225" rx="155" ry="120" fill="none" stroke="#059669" stroke-width="1" opacity="0.15"/>
  <ellipse cx="256" cy="225" rx="120" ry="92" fill="none" stroke="#059669" stroke-width="1.2" opacity="0.22"/>
  <ellipse cx="256" cy="225" rx="85" ry="65" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="256" cy="225" rx="48" ry="37" fill="none" stroke="#059669" stroke-width="1.8" opacity="0.4"/>

  <!-- Distribution network: trunk lines (source → junction buses) -->
  <!-- Source at top-center feeds the network -->
  <line x1="256" y1="100" x2="256" y2="170" stroke="#3b82f6" stroke-width="3" opacity="0.8"/>
  <!-- Main trunk splits -->
  <line x1="256" y1="170" x2="160" y2="210" stroke="#3b82f6" stroke-width="2.5" opacity="0.75"/>
  <line x1="256" y1="170" x2="352" y2="210" stroke="#3b82f6" stroke-width="2.5" opacity="0.75"/>

  <!-- Left sub-feeder -->
  <line x1="160" y1="210" x2="115" y2="270" stroke="#3b82f6" stroke-width="2" opacity="0.65"/>
  <line x1="160" y1="210" x2="185" y2="280" stroke="#3b82f6" stroke-width="2" opacity="0.65"/>
  <!-- Left leaves -->
  <line x1="115" y1="270" x2="90" y2="320" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <line x1="115" y1="270" x2="130" y2="330" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <line x1="185" y1="280" x2="170" y2="340" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <line x1="185" y1="280" x2="210" y2="335" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>

  <!-- Right sub-feeder -->
  <line x1="352" y1="210" x2="330" y2="280" stroke="#3b82f6" stroke-width="2" opacity="0.65"/>
  <line x1="352" y1="210" x2="400" y2="268" stroke="#3b82f6" stroke-width="2" opacity="0.65"/>
  <!-- Right leaves -->
  <line x1="330" y1="280" x2="305" y2="340" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <line x1="330" y1="280" x2="350" y2="338" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <line x1="400" y1="268" x2="390" y2="330" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <line x1="400" y1="268" x2="425" y2="315" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>

  <!-- Leaf load nodes -->
  <g filter="url(#node-glow)">
    <circle cx="90" cy="320" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="130" cy="330" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="170" cy="340" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="210" cy="335" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="305" cy="340" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="350" cy="338" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="390" cy="330" r="4.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="425" cy="315" r="4.5" fill="#3b82f6" opacity="0.7"/>
  </g>

  <!-- Junction bus nodes -->
  <g filter="url(#node-glow)">
    <circle cx="160" cy="210" r="8" fill="url(#node-fill)"/>
    <circle cx="352" cy="210" r="8" fill="url(#node-fill)"/>
    <circle cx="115" cy="270" r="6" fill="url(#node-fill)"/>
    <circle cx="185" cy="280" r="6" fill="url(#node-fill)"/>
    <circle cx="330" cy="280" r="6" fill="url(#node-fill)"/>
    <circle cx="400" cy="268" r="6" fill="url(#node-fill)"/>
  </g>

  <!-- Trunk junction node -->
  <circle cx="256" cy="170" r="9" fill="url(#node-fill)" filter="url(#node-glow)"/>

  <!-- Convergence path (optimization trajectory spiraling to optimum) -->
  <path d="M 370,140 C 340,150 320,175 300,180 C 278,186 268,198 262,210 C 258,218 256,222 256,225"
        fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Arrow tip on convergence path -->
  <polygon points="256,225 260,217 252,217" fill="#34d399" opacity="0.7"/>

  <!-- Source bus (substation) — top -->
  <g filter="url(#node-glow)">
    <circle cx="256" cy="100" r="12" fill="#e2e8f0" stroke="#2563eb" stroke-width="2.5"/>
    <!-- Sine wave inside source node (AC power) -->
    <path d="M 248,100 C 250,94 252,94 254,100 C 256,106 258,106 260,100" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Optimal point marker (star / crosshair at network center) -->
  <g filter="url(#opt-glow)">
    <circle cx="256" cy="225" r="10" fill="none" stroke="url(#opt-accent)" stroke-width="2"/>
    <line x1="256" y1="213" x2="256" y2="237" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
    <line x1="244" y1="225" x2="268" y2="225" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
    <circle cx="256" cy="225" r="3.5" fill="#34d399"/>
  </g>

  <!-- Text: GDM-OPF -->
  <text x="256" y="420" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#1e293b" letter-spacing="4">
    GDM-OPF
  </text>

  <!-- Subtitle -->
  <text x="256" y="455" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="18" fill="#64748b" letter-spacing="2">
    OPTIMAL POWER FLOW
  </text>
</svg>
